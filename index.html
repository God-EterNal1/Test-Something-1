<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐍 Super Snake: Ultra Realistic & VFX Edition</title>
    <style>
        body { background-color: #0e1111; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 20px; }
        h1 { margin-bottom: 10px; color: #00FF87; text-shadow: 0px 0px 15px rgba(0,255,135,0.6); }
        .game-container { display: flex; gap: 25px; max-width: 1100px; width: 100%; justify-content: center; flex-wrap: wrap; }
        .main-panel { display: flex; flex-direction: column; align-items: center; }
        .stats-bar { display: flex; justify-content: space-between; width: 440px; background: linear-gradient(135deg, #1f2525, #141919); padding: 12px 20px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 8px 16px rgba(0,0,0,0.4); border: 1px solid #2c3535; }
        .stat-box { font-size: 16px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px;}
        .coin-txt { color: #FFD700; } .score-txt { color: #00E5FF; } .high-txt { color: #FF5722; }
        canvas { border: 4px solid #222; background-color: #050707; box-shadow: 0px 15px 35px rgba(0,0,0,0.7); border-radius: 8px; }
        .side-panel { display: flex; flex-direction: column; gap: 20px; width: 340px; }
        .panel-box { background: #151a1a; border: 1px solid #242e2e; border-radius: 12px; padding: 20px; }
        .shop-container { max-height: 380px; overflow-y: auto; }
        .shop-item { display: flex; justify-content: space-between; align-items: center; background: #1c2323; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #2a3535; }
        .shop-btn { background: #00FF87; color: #050707; border: none; padding: 8px 14px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .shop-btn.owned { background: #00B0FF; color: white; }
        .shop-btn.equipped { background: #FF9100; color: white; }
        #game-over-screen { position: absolute; background: rgba(5,7,7,0.9); width: 440px; height: 440px; display: none; flex-direction: column; justify-content: center; align-items: center; border-radius: 8px; }
        #restart-btn { padding: 12px 28px; background: #00FF87; color: #000; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <h1>🐍 Super Snake: Ultra Realistic & VFX</h1>
    <div class="game-container">
        <div class="main-panel">
            <div class="stats-bar">
                <div class="stat-box score-txt">SCORE: <span id="ui-score">0</span></div>
                <div class="stat-box coin-txt">💰 COINS: <span id="ui-coins">0</span></div>
                <div class="stat-box high-txt">🏆 BEST: <span id="ui-highscore">0</span></div>
            </div>
            <div style="position: relative;">
                <canvas id="gameCanvas" width="440" height="440"></canvas>
                <div id="game-over-screen">
                    <h2 style="color: #ff3344;">GAME OVER</h2>
                    <button id="restart-btn">PLAY AGAIN</button>
                </div>
            </div>
        </div>
        <div class="side-panel">
            <div class="panel-box">
                <h3>🛒 EXCLUSIVE SKIN SHOP</h3>
                <div id="shop-container" class="shop-container"></div>
                <button onclick="tryGacha()" style="width:100%; padding:10px; margin-top:10px; cursor:pointer;">🎰 ลองสุ่มกาชา (1000 Coins)</button>
            </div>
        </div>
    </div>

    <script>
        // --- ส่วนประกาศตัวแปร ---
        let totalCoins = parseInt(localStorage.getItem('local_snake_coins')) || 0;
        let highScore = parseInt(localStorage.getItem('local_snake_highscore')) || 0;
        let unlockedItems = JSON.parse(localStorage.getItem('local_snake_unlocked')) || ['skin-green', 'hat-none'];
        let equippedSkin = localStorage.getItem('local_snake_equipped_skin') || 'skin-green';
        let equippedHat = localStorage.getItem('local_snake_equipped_hat') || 'hat-none';
        
        const shopItems = [
            { id: 'skin-green', type: 'skin', name: '🟢 งูเขียวมรกต', price: 0 },
            { id: 'skin-pink', type: 'skin', name: '🌸 งูชมพูซากุระ', price: 15 },
            { id: 'skin-red', type: 'skin', name: '🔴 งูแดงทับทิม', price: 30 },
            { id: 'skin-nebula', type: 'skin', name: '🌌 งูกาแล็กซี่', price: 60 },
            { id: 'skin-rainbow', type: 'skin', name: '🌈 งูนีออนเรนโบว์', price: 99 },
            { id: 'skin-dragon', type: 'skin', name: '🐲 งูมังกร (Legendary)', price: 9999 },
            { id: 'hat-none', type: 'hat', name: '❌ ไม่สวมหมวก', price: 0 },
            { id: 'hat-cowboy', type: 'hat', name: '🤠 หมวกคาวบอย', price: 20 },
            { id: 'hat-crown', type: 'hat', name: '👑 มงกุฎทองคำ', price: 85 }
        ];

        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const gridSize = 22;
        const tileCount = canvas.width / gridSize;
        let snake = [{ x: 10, y: 10 }, { x: 9, y: 10 }, { x: 8, y: 10 }];
        let food = { x: 5, y: 5 };
        let dx = 1, dy = 0;
        let currentScore = 0;
        let gameInterval, isGameOver = false, isPaused = false, rainbowHue = 0, particles = [];

        // --- ฟังก์ชันระบบต่างๆ ---
        function updateUI() {
            document.getElementById("ui-coins").innerText = totalCoins;
            document.getElementById("ui-score").innerText = currentScore;
            document.getElementById("ui-highscore").innerText = highScore;
            localStorage.setItem('local_snake_coins', totalCoins);
            localStorage.setItem('local_snake_highscore', highScore);
        }

        function tryGacha() {
            if (totalCoins < 1000) { alert("เงินไม่พอ! ต้อง 1,000 เหรียญ"); return; }
            totalCoins -= 1000;
            const legends = ['skin-dragon', 'skin-magma', 'skin-ice'];
            const reward = legends[Math.floor(Math.random() * legends.length)];
            if (!unlockedItems.includes(reward)) unlockedItems.push(reward);
            localStorage.setItem('local_snake_unlocked', JSON.stringify(unlockedItems));
            alert("🎉 ได้รับสกิน: " + reward);
            updateUI(); renderShop();
        }

        function applyAura() {
            if (equippedSkin === 'skin-dragon') { ctx.shadowBlur = 20; ctx.shadowColor = "#ffcc00"; }
            else if (equippedSkin === 'skin-magma') { ctx.shadowBlur = 20; ctx.shadowColor = "#ff4500"; }
            else if (equippedSkin === 'skin-ice') { ctx.shadowBlur = 20; ctx.shadowColor = "#00ffff"; }
        }

        function gameLoop() {
            if (isGameOver || isPaused) return;
            // ... (โค้ด Logic เกมคงเดิมที่นี่)
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            // เพิ่มการตรวจจับชนกำแพง/ตัวเอง
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount || snake.some(seg => seg.x === head.x && seg.y === head.y)) {
                isGameOver = true;
                document.getElementById("game-over-screen").style.display = "flex";
                return;
            }
            snake.unshift(head);
            if (head.x === food.x && head.y === food.y) {
                currentScore += 10; totalCoins += 1;
                if (currentScore > highScore) highScore = currentScore;
                food = { x: Math.floor(Math.random() * tileCount), y: Math.floor(Math.random() * tileCount) };
                updateUI();
            } else { snake.pop(); }
            draw();
        }

        function draw() {
            ctx.fillStyle = "#050707";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            applyAura(); // เปิดออร่า
            // วาดงู... (โค้ดวาดงูของคุณ)
            ctx.restore();
            ctx.shadowBlur = 0;
            // วาดอาหาร...
        }

        // --- Event Listener ---
        window.addEventListener("keydown", (e) => {
            if (e.key === "p" || e.key === "P") isPaused = !isPaused;
            if (e.key === "ArrowUp") { dx=0; dy=-1; } // เพิ่มปุ่มบังคับตามปกติ
            // ... (ใส่ปุ่ม W, A, S, D ต่อได้เลย)
        });

        document.getElementById("restart-btn").addEventListener("click", () => {
            location.reload(); // วิธีที่ง่ายที่สุดในการเริ่มใหม่
        });

        // เริ่มเกม
        updateUI();
        renderShop();
        gameInterval = setInterval(gameLoop, 90);
    </script>
</body>
</html>
