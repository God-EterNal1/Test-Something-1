<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐍 Super Snake: Local Custom Edition</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        h1 { margin-bottom: 10px; color: #4CAF50; text-shadow: 0px 0px 10px rgba(76,175,80,0.5); }

        .game-container {
            display: flex;
            gap: 20px;
            max-width: 1000px;
            width: 100%;
            justify-content: center;
            flex-wrap: wrap;
        }

        .main-panel { display: flex; flex-direction: column; align-items: center; }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            width: 400px;
            background: #2d2d2d;
            padding: 10px 20px;
            border-radius: 8px;
            margin-bottom: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            box-sizing: border-box;
        }

        .stat-box { font-size: 16px; font-weight: bold; }
        .coin-txt { color: #FFD700; }
        .score-txt { color: #00E5FF; }
        .high-txt { color: #FF9800; }

        canvas {
            border: 4px solid #333;
            background-color: #111;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.5);
            border-radius: 4px;
        }

        .side-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 320px;
        }

        .panel-box {
            background: #252525;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .panel-box h3 { margin-top: 0; border-bottom: 2px solid #4CAF50; padding-bottom: 5px; }

        /* ระบบร้านค้า */
        .shop-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1e1e1e;
            padding: 10px;
            margin: 8px 0;
            border-radius: 6px;
            border: 1px solid #444;
        }

        .shop-btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .shop-btn.owned { background: #2196F3; }
        .shop-btn.equipped { background: #FF9800; }
        .shop-btn:disabled { background: #555; cursor: not-allowed; }

        /* จอเกมโอเวอร์ */
        #game-over-screen {
            position: absolute;
            background: rgba(0,0,0,0.85);
            width: 400px;
            height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 4px;
            display: none;
        }
        #game-over-screen button { padding: 10px 20px; background: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold;}
    </style>
</head>
<body>

    <h1>🐍 Super Snake: Custom Shop Edition</h1>
    
    <div class="game-container">
        <div class="main-panel">
            <div class="stats-bar">
                <div class="stat-box score-txt">คะแนน: <span id="ui-score">0</span></div>
                <div class="stat-box coin-txt">💰 เงิน: <span id="ui-coins">0</span></div>
                <div class="stat-box high-txt">🏆 สถิติสูงสุด: <span id="ui-highscore">0</span></div>
            </div>
            
            <div style="position: relative;">
                <canvas id="gameCanvas" width="400" height="400"></canvas>
                
                <div id="game-over-screen">
                    <h2 style="color: #ff4444; margin: 0 0 10px 0; font-size: 32px;">GAME OVER</h2>
                    <p style="font-size: 18px; margin-bottom: 20px;">คะแนนรอบนี้: <span id="final-score-txt" style="color:#00E5FF; font-weight:bold;">0</span></p>
                    <button id="restart-btn">เล่นใหม่อีกครั้ง</button>
                </div>
            </div>
        </div>

        <div class="side-panel">
            <div class="panel-box">
                <h3>🛒 ร้านค้าสกิน & แฟชั่น</h3>
                <div id="shop-container"></div>
            </div>
        </div>
    </div>

    <script>
        // --- ระบบบันทึกข้อมูลฝังไว้ในเครื่อง (Local Storage) ---
        let totalCoins = parseInt(localStorage.getItem('local_snake_coins')) || 0;
        let highScore = parseInt(localStorage.getItem('local_snake_highscore')) || 0;
        let unlockedItems = JSON.parse(localStorage.getItem('local_snake_unlocked')) || ['skin-green', 'hat-none'];
        let equippedSkin = localStorage.getItem('local_snake_equipped_skin') || 'skin-green';
        let equippedHat = localStorage.getItem('local_snake_equipped_hat') || 'hat-none';

        const shopItems = [
            { id: 'skin-green', type: 'skin', name: '🟢 สกินสีเขียว', price: 0 },
            { id: 'skin-pink', type: 'skin', name: '🌸 สกินสีชมพูพาสเทล', price: 15 },
            { id: 'skin-red', type: 'skin', name: '🔴 สกินสีแดงเพลิง', price: 30 },
            { id: 'skin-rainbow', type: 'skin', name: '🌈 สกินสีรุ้งไฟวิ่ง', price: 80 },
            { id: 'hat-none', type: 'hat', name: '🤠 ไม่ใส่หมวก', price: 0 },
            { id: 'hat-cowboy', type: 'hat', name: '🤠 หมวกคาวบอยสุดเท่', price: 20 },
            { id: 'hat-mask', type: 'hat', name: '🎭 หน้ากากแฟนซี', price: 45 },
        ];

        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = [{ x: 10, y: 10 }];
        let food = { x: 5, y: 5 };
        let dx = 1, dy = 0;
        let currentScore = 0;
        let gameInterval;
        let isGameOver = false;
        let rainbowHue = 0;

        function updateUI() {
            document.getElementById("ui-coins").innerText = totalCoins;
            document.getElementById("ui-score").innerText = currentScore;
            document.getElementById("ui-highscore").innerText = highScore;
            
            // เซฟค่าลงเบราว์เซอร์
            localStorage.setItem('local_snake_coins', totalCoins);
            localStorage.setItem('local_snake_highscore', highScore);
        }

        function renderShop() {
            const container = document.getElementById("shop-container");
            container.innerHTML = "";
            shopItems.forEach(item => {
                const div = document.createElement("div");
                div.className = "shop-item";
                
                let btnText = `💰 ${item.price}`;
                let btnClass = "shop-btn";
                let isDisabled = false;

                if (unlockedItems.includes(item.id)) {
                    if (equippedSkin === item.id || equippedHat === item.id) {
                        btnText = "ใช้งานอยู่";
                        btnClass = "shop-btn equipped";
                    } else {
                        btnText = "สวมใส่";
                        btnClass = "shop-btn owned";
                    }
                } else if (totalCoins < item.price) {
                    isDisabled = true;
                }

                div.innerHTML = `<span>${item.name}</span>`;
                const btn = document.createElement("button");
                btn.className = btnClass;
                btn.innerText = btnText;
                btn.disabled = isDisabled;
                
                btn.onclick = () => {
                    if (!unlockedItems.includes(item.id)) {
                        totalCoins -= item.price;
                        unlockedItems.push(item.id);
                        localStorage.setItem('local_snake_unlocked', JSON.stringify(unlockedItems));
                    }
                    if (item.type === 'skin') equippedSkin = item.id;
                    if (item.type === 'hat') equippedHat = item.id;
                    
                    localStorage.setItem('local_snake_equipped_skin', equippedSkin);
                    localStorage.setItem('local_snake_equipped_hat', equippedHat);
                    
                    updateUI();
                    renderShop();
                };
                
                div.appendChild(btn);
                container.appendChild(div);
            });
        }

        function resetGame() {
            snake = [{ x: 10, y: 10 }, { x: 9, y: 10 }];
            generateFood();
            dx = 1; dy = 0;
            currentScore = 0;
            isGameOver = false;
            document.getElementById("game-over-screen").style.display = "none";
            updateUI();
            clearInterval(gameInterval);
            gameInterval = setInterval(gameLoop, 100);
        }

        function generateFood() {
            food.x = Math.floor(Math.random() * tileCount);
            food.y = Math.floor(Math.random() * tileCount);
        }

        function gameLoop() {
            if (isGameOver) return;

            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount || snake.some(seg => seg.x === head.x && seg.y === head.y)) {
                endGame();
                return;
            }

            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                currentScore += 10;
                totalCoins += 1; // กินได้ 1 ชิ้น รับเงิน 1 Coin นำไปสะสมซื้อชุดแต่งกาย
                if (currentScore > highScore) {
                    highScore = currentScore;
                }
                updateUI();
                renderShop();
                generateFood();
            } else {
                snake.pop();
            }

            draw();
        }

        function draw() {
            ctx.fillStyle = "#111";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // วาดอาหาร (ผลไม้สีแดงมีแสงออร่า)
            ctx.fillStyle = "#ff3333";
            ctx.shadowColor = "#ff3333";
            ctx.shadowBlur = 10;
            ctx.beginPath();
            ctx.arc(food.x * gridSize + gridSize/2, food.y * gridSize + gridSize/2, gridSize/2 - 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0; 

            rainbowHue = (rainbowHue + 3) % 360;

            // วาดตัวงูตามดีไซน์และชุดแต่งกาย
            snake.forEach((part, index) => {
                const isHead = index === 0;
                
                if (equippedSkin === 'skin-pink') {
                    ctx.fillStyle = isHead ? "#FF69B4" : "#FFB6C1";
                } else if (equippedSkin === 'skin-red') {
                    ctx.fillStyle = isHead ? "#D50000" : "#FF5252";
                } else if (equippedSkin === 'skin-rainbow') {
                    ctx.fillStyle = `hsl(${(rainbowHue + index * 15) % 360}, 90%, 60%)`;
                } else {
                    ctx.fillStyle = isHead ? "#2E7D32" : "#4CAF50";
                }

                ctx.beginPath();
                ctx.arc(part.x * gridSize + gridSize/2, part.y * gridSize + gridSize/2, gridSize/2 - 1, 0, Math.PI * 2);
                ctx.fill();

                if (isHead) {
                    const hX = part.x * gridSize;
                    const hY = part.y * gridSize;
                    
                    if (equippedHat === 'hat-cowboy') {
                        ctx.fillStyle = "#8B4513"; 
                        ctx.fillRect(hX + 2, hY - 4, 16, 5); 
                        ctx.fillRect(hX + 5, hY - 10, 10, 7); 
                    } else if (equippedHat === 'hat-mask') {
                        ctx.fillStyle = "#00E5FF"; 
                        ctx.fillRect(hX + 3, hY + 4, 14, 6);
                        ctx.fillStyle = "#000"; 
                        ctx.fillRect(hX + 5, hY + 6, 3, 3);
                        ctx.fillRect(hX + 12, hY + 6, 3, 3);
                    }
                }
            });
        }

        function endGame() {
            isGameOver = true;
            clearInterval(gameInterval);
            document.getElementById("final-score-txt").innerText = currentScore;
            document.getElementById("game-over-screen").style.display = "flex";
        }

        window.addEventListener("keydown", e => {
            if (e.key === "ArrowUp" || e.key === "w") { if (dy === 0) { dx = 0; dy = -1; } }
            else if (e.key === "ArrowDown" || e.key === "s") { if (dy === 0) { dx = 0; dy = 1; } }
            else if (e.key === "ArrowLeft" || e.key === "a") { if (dx === 0) { dx = -1; dy = 0; } }
            else if (e.key === "ArrowRight" || e.key === "d") { if (dx === 0) { dx = 1; dy = 0; } }
        });

        document.getElementById("restart-btn").addEventListener("click", resetGame);

        updateUI();
        renderShop();
        resetGame();
    </script>
</body>
</html>
