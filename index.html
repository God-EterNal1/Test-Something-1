<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เกมงูคลาสสิก (Snake Game)</title>
    <style>
        body { background-color: #222; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        canvas { border: 4px solid #fff; background-color: #000; }
        .score { font-size: 24px; margin-top: 10px; }
    </style>
</head>
<body>
   <h1>🐍 Snake Game</h1>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div class="score">คะแนน: <span id="scoreVal">0</span></div>
    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const gridSize = 20; const tileCount = canvas.width / gridSize;
        let snake = [{x: 10, y: 10}]; let food = {x: 15, y: 15}; let dx = 0; let dy = 0; let score = 0;
        function drawGame() {
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            if (head.x < 0) head.x = tileCount - 1; if (head.x >= tileCount) head.x = 0;
            if (head.y < 0) head.y = tileCount - 1; if (head.y >= tileCount) head.y = 0;
            for (let i = 0; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y && (dx !== 0 || dy !== 0)) {
                    snake = [{x: 10, y: 10}]; dx = 0; dy = 0; score = 0;
                    document.getElementById("scoreVal").innerText = score; return;
                }
            }
            snake.unshift(head);
            if (head.x === food.x && head.y === food.y) { score += 10; document.getElementById("scoreVal").innerText = score; generateFood(); } else { snake.pop(); }
            ctx.fillStyle = "#000"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#00ff00"; snake.forEach(part => ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize - 2, gridSize - 2));
            ctx.fillStyle = "#ff0000"; ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 2, gridSize - 2);
        }
        function generateFood() { food.x = Math.floor(Math.random() * tileCount); food.y = Math.floor(Math.random() * tileCount); }
        window.addEventListener("keydown", e => {
            switch(e.key) {
                case "ArrowUp": if (dy === 0) { dx = 0; dy = -1; } break;
                case "ArrowDown": if (dy === 0) { dx = 0; dy = 1; } break;
                case "ArrowLeft": if (dx === 0) { dx = -1; dy = 0; } break;
                case "ArrowRight": if (dx === 0) { dx = 1; dy = 0; } break;
            }
        });
        setInterval(drawGame, 100);
    </script>
</body>
</html>
